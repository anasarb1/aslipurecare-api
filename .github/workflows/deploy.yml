# ---------------------------------------------------------------------------
# AslipureCare API — CI/CD Pipeline
# ---------------------------------------------------------------------------
# Triggers:  push to main branch
# Jobs:
#   1. test   — install deps, run pytest suite
#   2. build  — install deps, run health-check smoke tests
#   3. docker — build Docker image
# ---------------------------------------------------------------------------

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: aslipurecare-api
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — pytest test suite
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest tests/test_app.py -v

  # ---------------------------------------------------------------------------
  # Job 2 — build & health check smoke tests
  # ---------------------------------------------------------------------------
  build:
    name: Build & Health Check
    runs-on: ubuntu-latest
    needs: test           # only runs if test job passes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Flask development server (background)
        run: |
          python app.py &
          sleep 3

      - name: Health check — root endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          echo "GET / returned HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Root endpoint failed" && exit 1)

      - name: Health check — /health endpoint
        run: |
          BODY=$(curl -s http://localhost:5000/health)
          echo "Response: $BODY"
          echo "$BODY" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', 'status field is not healthy'
          assert data['service'] == 'aslipurecare-api', 'service field mismatch'
          print('Health check passed')
          "

      - name: Health check — /products endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/products)
          echo "GET /products returned HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Products endpoint failed" && exit 1)

  # ---------------------------------------------------------------------------
  # Job 3 — Docker build
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build          # only runs if build job passes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: docker image inspect ${{ env.IMAGE_NAME }}:latest
