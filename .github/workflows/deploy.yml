# ---------------------------------------------------------------------------
# AslipureCare API — CI/CD Pipeline
# ---------------------------------------------------------------------------
# Triggers:  push to main branch
# Jobs:
#   1. build  — install deps, lint (optional), run health-check smoke test
#   2. docker — build Docker image (and push to registry if secrets present)
# ---------------------------------------------------------------------------

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Change this to your Docker Hub username / registry prefix.
  IMAGE_NAME: aslipurecare-api
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — build & test
  # ---------------------------------------------------------------------------
  build:
    name: Build & Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip           # cache pip dependencies between runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Flask development server (background)
        run: |
          # Start the app in the background; give it a moment to bind.
          python app.py &
          sleep 3

      - name: Health check — root endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          echo "GET / returned HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Root endpoint failed" && exit 1)

      - name: Health check — /health endpoint
        run: |
          BODY=$(curl -s http://localhost:5000/health)
          echo "Response: $BODY"
          echo "$BODY" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', 'status field is not healthy'
          assert data['service'] == 'aslipurecare-api', 'service field mismatch'
          print('Health check passed')
          "

      - name: Health check — /products endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/products)
          echo "GET /products returned HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Products endpoint failed" && exit 1)

  # ---------------------------------------------------------------------------
  # Job 2 — Docker build (and optional push)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build          # only run if the build job passes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Uncomment the next two steps and add DOCKERHUB_USERNAME /
      # DOCKERHUB_TOKEN secrets in your repository settings to push the image.
      #
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # - name: Push image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true         # export image to local Docker daemon
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: docker image inspect ${{ env.IMAGE_NAME }}:latest
