# ---------------------------------------------------------------------------
# AslipureCare API — docker-compose for local development / testing
# ---------------------------------------------------------------------------
# Usage:
#   docker compose up --build        # build image and start container
#   docker compose up -d             # run in background
#   docker compose down              # stop and remove containers
# ---------------------------------------------------------------------------

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aslipurecare-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-prod!!}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-aslipure2024}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///products.db}
    volumes:
      # Persist the SQLite database across container restarts
      - db_data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
